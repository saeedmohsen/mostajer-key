<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostajer Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}

body{
  display:flex;
  background:#0f172a;
  color:white;
}

/* Sidebar */
.sidebar{
  width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  position:fixed;
}

.sidebar h2{
  margin-bottom:30px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

/* Main */
.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

/* Cards */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter: blur(10px);
}

/* Form */
.form{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#334155;
  color:white;
}

button.primary{
  margin-top:15px;
  background:#22c55e;
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* Login */
.login{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
}

.login-box{
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  width:300px;
}

.hidden{display:none;}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h3>🔐 تسجيل الدخول</h3>
    <input id="email" placeholder="الإيميل">
    <input id="pass" placeholder="الرمز">
    <button class="primary" onclick="login()">دخول</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Mostajer</h2>
  <button onclick="show('dashboard')">📊 الرئيسية</button>
  <button onclick="show('create')">➕ إنشاء كود</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="cards">
    <div class="card">💰 الأرباح<br><b id="money">0</b></div>
    <div class="card">🔑 الأكواد<br><b id="codes">0</b></div>
    <div class="card">🌍 الدول<br><b>0</b></div>
  </div>
</div>

<!-- CREATE -->
<div id="create" class="hidden">
  <div class="form">
    <h3>إنشاء كود</h3>

    <input id="name" placeholder="الاسم">
    <input id="phone" placeholder="رقم الجوال">
    <input id="device" placeholder="رقم الجهاز">

    <select id="duration">
      <option>شهر</option>
      <option>سنة</option>
      <option>مدى الحياة</option>
    </select>

    <input id="amount" placeholder="المبلغ">
    <input id="country" placeholder="الدولة">

    <button class="primary" onclick="create()">إنشاء</button>

    <p id="result"></p>
  </div>
</div>

</div>

<script>

const API = "PUT_YOUR_APPS_SCRIPT_URL_HERE";

function login(){
  if(
    email.value==="saeed_200911@hotmail.com" &&
    pass.value==="Saee200911"
  ){
    login.style.display="none";
  }else{
    alert("خطأ");
  }
}

function show(page){
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("create").classList.add("hidden");
  document.getElementById(page).classList.remove("hidden");
}

function create(){
  const data = {
    name: name.value,
    phone: phone.value,
    deviceId: device.value,
    duration: duration.value,
    amount: amount.value,
    country: country.value
  };

  fetch(API,{
    method:"POST",
    body: JSON.stringify(data)
  })
  .then(r=>r.json())
  .then(res=>{
    result.innerText = "✅ " + res.code;
  });
}

</script>

</body>
</html>
