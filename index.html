<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>MostajerPro</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 50px;
}

input, select {
  padding: 10px;
  margin: 5px;
  width: 250px;
}

button {
  padding: 10px 20px;
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  font-size: 18px;
}
</style>

</head>

<body>

<h2>إنشاء كود تفعيل</h2>

<input id="name" placeholder="اسم المستخدم"><br>
<input id="phone" placeholder="رقم الجوال"><br>
<input id="device" placeholder="رقم الجهاز"><br>

<select id="duration">
  <option>شهر</option>
  <option>سنة</option>
  <option>أسبوع</option>
  <option>يوم</option>
  <option>ساعة</option>
  <option>دقيقة</option>
  <option>مدى الحياة</option>
</select>

<br><br>
<button onclick="sendData()">إنشاء الكود</button>

<div id="result"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxUqirI5oqTTLnVamjUKcgbc0aO6iVbIGY7CEcVJqfOYYz5ZJqvBUgJoiLcEsft6u0q/exec";

async function sendData() {
  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    device: document.getElementById("device").value,
    duration: document.getElementById("duration").value
  };

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  const result = await res.json();

  document.getElementById("result").innerHTML =
    "✅ الكود: " + result.code + "<br>" +
    "📅 تاريخ الانتهاء: " + result.endDate + "<br>" +
    "🔵 الحالة: " + result.status;
}
</script>

</body>
</html>
